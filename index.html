<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Pizzaria</title>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="#inicio" aria-label="Forno vila">
            <span class="brand-mark">F</span>
            <span>Forno da Vila</span>
        </a>

        <nav class="main-nav" aria-label="Navegação Principal">
          <a href="#cardapio">Cardápio</a>
          <a href="sobre">Sobre</a>
          <a href="#contato">Contato</a>
        </nav>

        <a class=" heder-action" heref="#pedido">
            <i data-lucide="shopping-bag">Pedir</i>
        </a>
    </header>

    <main>
        <section class="hero" id="inicio">
            <div class="hero-content">
                <p class="eyebrow">PIzzaria artesanal em Sao Paulo</p>
                <h1>Forno da Vila</h1>
                <p class="hero-text">
                     Massas de fermentacao lenta, molho de tomates frescos e sabores
                     preparados para chegar quentinhos na sua mesa.
                </p>
                <div class="hero-actions">
                    <a class="button primario" href="#cardapio">
                        <i data-lucide="utensils"></i>
                        Ver Cardapio
                    </a>
                    <a class="button secondary" href="#contato">
                        <i data-lucide="phone"></i>
                        Reservar mesa
                    </a>
                </div>
            </div>
        </section>


    </main>
</body>
</html>
